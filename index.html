<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Confirmed – KCW</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f2f2f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 36px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #1c1c1e;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      color: #6e6e73;
      line-height: 1.5;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: #007aff;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .note {
      margin-top: 20px;
      font-size: 13px;
      color: #aeaeb2;
    }
    @media (prefers-color-scheme: dark) {
      body  { background: #1c1c1e; }
      .card { background: #2c2c2e; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
      h1    { color: #f2f2f7; }
      p     { color: #aeaeb2; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Email Confirmed!</h1>
    <p>Your KCW account is all set.<br>Return to the app to start learning Korean.</p>
    <a class="btn" href="kcwios://login-callback">Open KCW App</a>
    <p class="note">If the button doesn't work, simply reopen the KCW app on your iPhone.</p>
  </div>

  <script>
    // Auto-open the app when the page loads (works on iOS Safari)
    window.location.href = "kcwios://login-callback";
  </script>
</body>
</html>
